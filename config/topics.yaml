      - "episodic memory LLM"
      - "working memory AI agent"
      - "knowledge graph memory agent"
      - "Mem0 scalable memory"
    research_questions:
      - "如何构建可持续的 Agent 记忆系统？"
      - "短期记忆 vs 长期记忆的技术实现差异？"
      - "现有记忆方案的优劣势对比？"
