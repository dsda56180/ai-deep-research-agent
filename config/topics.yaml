# =============================================
# 研究配置
# =============================================

settings:
  # 每次研究的论文数量限制
  max_papers_per_session: 5
  
  # 论文来源优先级
  paper_sources:
    - name: arXiv
      categories: [cs.AI, cs.CL, cs.LG]
      recent_days: 90
    - name: Papers with Code
      sort: citations
      min_citations: 10
    - name: 顶级会议
      venues: [NeurIPS, ICML, ICLR, ACL, EMNLP]
  
  # 内容质量阈值
  quality_threshold:
    min_relevance: 0.7
    min_paper_quality: "peer_reviewed"  # peer_reviewed | arxiv | any
  
  # 分析深度
  analysis_depth:
    core_method: true      # 核心技术分析
    innovation: true      # 创新点评估
    experiments: true     # 实验结果解读
    limitations: true     # 局限性分析
    comparison: true       # 与已有工作对比

# =============================================
# IMA 知识库同步配置
# =============================================

ima_sync:
  # 同步策略：每次研究后自动同步
  auto_sync: true
  
  # 文档格式：Markdown
  format: markdown
  
  # 文档命名：[主题] 深度研究 - YYYY-MM-DD
  naming_pattern: "{topic} 深度研究 - {date}"

# =============================================
# 知识图谱配置
# =============================================

knowledge_graph:
  # 存储格式：JSON
  format: json
  
  # 图谱文件位置
  storage_path: knowledge/graphs/
  
  # 自动更新
  auto_update: true
  
  # 概念类型
  concept_types:
    - system      # 系统/框架
    - concept     # 概念
    - method      # 方法
    - dataset     # 数据集
    - metric      # 指标
  
  # 关系类型
  relation_types:
    - implements  # 实现
    - extends     # 扩展
    - competes    # 竞争
    - combines    # 结合
    - validates   # 验证
    - contradicts # 矛盾